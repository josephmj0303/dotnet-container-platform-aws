name: Build and Deploy Dotnet Containers

on:
  push:
    branches:
      - main

env:
  REGISTRY: docker.io
  DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:

  build:

    name: Build and Push Images
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service:
          - finance
          - inventory
          - school
          - vivahadeepam

    steps:

    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to DockerHub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Extract Metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}-app
        tags: |
          type=sha
          type=raw,value=latest

    - name: Build and Push Image
      uses: docker/build-push-action@v5
      with:
        context: ./apps/${{ matrix.service }}
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        cache-from: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}-app:buildcache
        cache-to: type=registry,ref=${{ env.DOCKERHUB_USERNAME }}/${{ matrix.service }}-app:buildcache,mode=max


  deploy:

    name: Deploy to AWS EC2
    needs: build
    runs-on: ubuntu-latest

    steps:

    - name: Deploy Application via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USER }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |

          cd /home/ubuntu/dotnet-container-platform-aws
          git pull origin main
          echo "Pulling latest images..."
          docker compose pull
          echo "Restarting containers..."
          docker compose up -d --remove-orphans
          echo "Cleaning unused images..."
          docker image prune -af

